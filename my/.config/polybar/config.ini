[colors]
background = #301934
foreground = #faf9f6


[bar/primary]
monitor = eDP-1
; monitor = Virtual1

bottom = false

override-redirect = false

enable-ipc = true

modules-left = i3
modules-center = date
modules-right = bluetooth backlight wired wireless pulseaudio battery

fixed-center = true

width = 100%
height = 50

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0

padding-left = 0
padding-right = 2

module-margin = 2

font-0 = RobotoMono Nerd Font:style=Regular;size=12;0

dpi-x = 0
dpi-y = 0


[bar/external]
monitor = HDMI-1

inherit = bar/primary


[module/i3]
type = internal/i3

pin-workspaces = true

index-sort = true

enable-scroll = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = #d2042d

label-focused =  %index%
label-focused-padding = 3
label-focused-background = #3f3f3f

label-unfocused = %index%
label-unfocused-padding = 3

label-visible = %index%
label-visible-padding = 3

label-urgent = %index%
label-urgent-padding = 3


[module/date]
type = internal/date

interval = 1

time = %H:%M:%S
time-alt = %d/%m/%y %A

format = <label>

label = %time%


