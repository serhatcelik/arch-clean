[colors]
background = "#301934"
background-focused = "#3f3f3f"
background-mode = "#d2042d"
foreground = "#faf9f6"

[monitors]
external = HDMI-1
primary = eDP-1

[bar/primary]
background = ${colors.background}
bottom = false
dpi-x = 0
dpi-y = 0
enable-ipc = true
fixed-center = true
font-0 = "JetBrains Mono:style=Regular;size=12;0"
foreground = ${colors.foreground}
height = 50
module-margin = 2
modules-center = date
modules-left = i3
modules-right = backlight tun wireless wired audio monitor battery power
monitor = ${monitors.primary}
override-redirect = false
padding-left = 0
padding-right = 2
radius = 0
width = 100%

[bar/external]
inherit = bar/primary
monitor = ${monitors.external}

[module/audio]
click-left = pavucontrol
click-right = pavucontrol
format-muted = [<label-muted>]
format-volume = [<label-volume>]
interval = 5
label-muted = MUT
label-volume = %percentage:3%
type = internal/pulseaudio
use-ui-max = false

[module/backlight]
format = [<label>]
label = %percentage:3%
enable-scroll = true
poll-interval = 0
scroll-interval = 5
type = internal/backlight
use-actual-brightness = true

[module/battery]
animation-charging-0 = "+  "
animation-charging-1 = "++ "
animation-charging-2 = "+++"
animation-charging-framerate = 1000
animation-low-0 = "L  "
animation-low-1 = "LO "
animation-low-2 = "LOW"
animation-low-framerate = 1000
battery = BAT0
format-charging = [<animation-charging>]
format-discharging = [<label-discharging>]
format-full = [<label-full>]
format-low = [<animation-low>]
full-at = 100
label-discharging = %percentage:3%
label-full = 100
low-at = 15
poll-interval = 30
type = internal/battery

[module/date]
format = <label>
interval = 1
label = %time%
time = %H:%M:%S
time-alt = %d/%m/%y %A
type = internal/date

[module/i3]
enable-scroll = false
format = <label-state> <label-mode>
index-sort = true
label-focused = %index%
label-focused-background = ${colors.background-focused}
label-focused-padding = 3
label-mode = %mode%
label-mode-background = ${colors.background-mode}
label-mode-padding = 2
label-unfocused = %index%
label-unfocused-padding = 3
label-urgent = %index%
label-urgent-padding = 3
label-visible = %index%
label-visible-padding = 3
pin-workspaces = true
type = internal/i3

[module/monitor]
click-left = "#monitor.hook.0"
click-right = "#monitor.hook.1"
format = [<label>]
hook-0 = arandr
hook-1 = arandr
label = MON
type = custom/ipc

[module/power]
click-left = "#power.hook.0"
click-middle = "#power.hook.2"
click-right = "#power.hook.1"
format = [<label>]
hook-0 = bash "$HOME"/.local/bin/power.sh systemctl poweroff
hook-1 = bash "$HOME"/.local/bin/power.sh systemctl reboot
hook-2 = bash "$HOME"/.local/bin/power.sh i3-msg exit
label = POWER
type = custom/ipc

[module/tun]
exec = echo TUN
exec-if = ip a | grep "tun[0-9]"
format = [<label>]
interval = 5
label = %output%
type = custom/script

[module/wired]
format-connected = [<label-connected>]
format-disconnected = [<label-disconnected>]
interface = eth0
interface-type = wired
interval = 5
label-connected = ETHER
label-disconnected = ether
type = internal/network
unknown-as-up = false

[module/wireless]
format-connected = [<label-connected>]
format-disconnected = [<label-disconnected>]
interface = wlan0
interface-type = wireless
interval = 5
label-connected = %{A1:alacritty -e nmtui-connect:}%{A3:nm-connection-editor:}WLAN%{A}%{A}
label-disconnected = %{A1:alacritty -e nmtui-connect:}%{A3:nm-connection-editor:}wlan%{A}%{A}
type = internal/network
unknown-as-up = false
