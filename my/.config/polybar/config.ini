[colors]
background = "#301934"
foreground = "#faf9f6"

[monitors]
primary = eDP-1
external = HDMI-1

[bar/primary]
monitor = ${monitors.primary}

enable-ipc = true

bottom = false

override-redirect = false

modules-left = i3
modules-center = date
modules-right = backlight vpn wireless wired pulseaudio applets battery

fixed-center = true

width = 100%
height = 50

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0

padding-left = 0
padding-right = 2

module-margin = 2

font-0 = "RobotoMono Nerd Font:style=Regular;size=12;0"

dpi-x = 0
dpi-y = 0


[bar/external]
monitor = ${monitors.external}

inherit = bar/primary


[module/applets]
type = custom/ipc

format = <label>

label = ΎΛΥ ≤░Ξ╣ ΎΘτ

hook-0 = blueberry
hook-1 = arandr
hook-2 = nm-connection-editor

click-left = "#applets.hook.0"
click-middle = "#applets.hook.1"
click-right = "#applets.hook.2"


[module/backlight]
type = custom/ipc

format = ΎΦλ <label>

label = %output:3%%

hook-0 = echo $(((100*$(brightnessctl get))/26666))
hook-1 = brightnessctl set 10%+ && echo $(((100*$(brightnessctl get))/26666))
hook-2 = brightnessctl set 10%- && echo $(((100*$(brightnessctl get))/26666))

initial = 1

scroll-up = "#backlight.hook.1"
scroll-down = "#backlight.hook.2"


[module/battery]
type = internal/battery

poll-interval = 5

full-at = 99
low-at = 5

battery = BAT0

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = ≤░Β╣ <label-full>
format-low = <ramp-capacity> <label-low>

label-charging = %percentage:3%%
label-discharging = %percentage:3%%
label-full = %percentage:3%%
label-low = %percentage:3%%

ramp-capacity-0 = ≤░ΓΟ
ramp-capacity-1 = ≤░ΓΟ
ramp-capacity-2 = ≤▒Λκ
ramp-capacity-3 = ≤▒Λκ
ramp-capacity-4 = ≤▒Λλ
ramp-capacity-5 = ≤▒Λλ
ramp-capacity-6 = ≤▒Λμ
ramp-capacity-7 = ≤▒Λμ

animation-charging-framerate = 1000

animation-charging-0 = ≤▒Λκ
animation-charging-1 = ≤▒Λλ
animation-charging-2 = ≤▒Λμ


[module/date]
type = internal/date

interval = 1

time = %H:%M:%S
time-alt = %d/%m/%y %A

format = <label>

label = %time%


[module/i3]
type = internal/i3

pin-workspaces = true

index-sort = true

enable-scroll = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = "#d2042d"

label-focused =  %index%
label-focused-padding = 3
label-focused-background = "#3f3f3f"

label-unfocused = %index%
label-unfocused-padding = 3

label-visible = %index%
label-visible-padding = 3

label-urgent = %index%
label-urgent-padding = 3


[module/pulseaudio]
type = internal/pulseaudio

interval = 5

use-ui-max = false

format-volume = <ramp-volume> <label-volume>
format-muted = ≤░Χ┐ <label-muted>

label-volume = %percentage:3%%
label-muted = %percentage:3%%

ramp-volume-0 = ≤░ΨΑ
ramp-volume-1 = ≤░Χ╛

click-left = pavucontrol
click-right = pavucontrol


[module/vpn]
type = custom/script

interval = 3

exec = echo ≤░ΨΓ
exec-if = ip a | grep tun0

format = <label>

label = %output%


[module/wired]
type = internal/network

interval = 3

interface = eth0

interface-type = wired

unknown-as-up = false

format-connected = ≤░▒Υ
format-disconnected = ≤░Ζδ


[module/wireless]
type = internal/network

interval = 3

interface = wlan0

interface-type = wireless

unknown-as-up = false

format-connected = <ramp-signal>
format-disconnected = ≤░νφ

ramp-signal-0 = ≤░νψ
ramp-signal-1 = ≤░νθ
ramp-signal-2 = ≤░νλ
ramp-signal-3 = ≤░νξ
ramp-signal-4 = ≤░νρ
