[colors]
background = "#301934"
background-focused = "#3f3f3f"
background-mode = "#d2042d"
foreground = "#faf9f6"


[monitors]
primary = eDP-1
external = HDMI-1


[bar/primary]
monitor = ${monitors.primary}

enable-ipc = true

bottom = false

override-redirect = false

modules-left = i3
modules-center = date
modules-right = backlight tun wireless wired audio bluetooth monitor battery power

fixed-center = true

width = 100%
height = 50

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0

padding-left = 0
padding-right = 2

module-margin = 2

font-0 = "MesloLGS NF:style=Regular;size=12;0"

dpi-x = 0
dpi-y = 0


[bar/external]
monitor = ${monitors.external}

inherit = bar/primary


[module/audio]
type = internal/pulseaudio

interval = 5

use-ui-max = false

format-volume = [<label-volume>]
format-muted = [<label-muted>]

label-volume = %percentage:3%
label-muted = MUT

click-left = pavucontrol
click-right = pavucontrol


[module/backlight]
type = custom/ipc

format = [<label>]

label = %output:3%

hook-0 = brightnessctl set 00%+ 2> /dev/null | grep -o -P "[0-9]+(?=%)" || echo 100
hook-1 = brightnessctl set 10%+ 2> /dev/null | grep -o -P "[0-9]+(?=%)" || echo 100
hook-2 = brightnessctl set 10%- 2> /dev/null | grep -o -P "[0-9]+(?=%)" || echo 100

initial = 1

scroll-up = "#backlight.hook.1"
scroll-down = "#backlight.hook.2"


[module/battery]
type = internal/battery

poll-interval = 5

full-at = 100
low-at = 15

battery = BAT0

format-charging = [<animation-charging>]
format-discharging = [<label-discharging>]
format-full = [<label-full>]
format-low = [<animation-low>]

label-discharging = %percentage:3%
label-full = 100

animation-charging-0 = "+  "
animation-charging-1 = "++ "
animation-charging-2 = "+++"
animation-charging-framerate = 1000

animation-low-0 = "LOW"
animation-low-1 = "   "
animation-low-framerate = 1000


[module/bluetooth]
type = custom/ipc

format = [<label>]

label = BLU

hook-0 = blueberry

click-left = "#bluetooth.hook.0"


[module/date]
type = internal/date

interval = 1

time = %H:%M:%S
time-alt = %d/%m/%y %A

format = <label>

label = %time%


[module/i3]
type = internal/i3

pin-workspaces = true

index-sort = true

enable-scroll = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.background-mode}

label-focused = %index%
label-focused-padding = 3
label-focused-background = ${colors.background-focused}

label-unfocused = %index%
label-unfocused-padding = 3

label-visible = %index%
label-visible-padding = 3

label-urgent = %index%
label-urgent-padding = 3


[module/monitor]
type = custom/ipc

format = [<label>]

label = MON

hook-0 = arandr

click-left = "#monitor.hook.0"


[module/power]
type = custom/ipc

format = [<label>]

label = POW

hook-0 = ~/.config/polybar/power.py "Power Off" && shutdown --poweroff now
hook-1 = ~/.config/polybar/power.py "Reboot" && shutdown --reboot now

click-left = "#power.hook.0"
click-right = "#power.hook.1"


[module/tun]
type = custom/script

interval = 3

exec = echo TUN
exec-if = ip a | grep "tun[0-9]"

format = [<label>]

label = %output%


[module/wired]
type = internal/network

interval = 3

interface = eth0

interface-type = wired

unknown-as-up = false

format-connected = [<label-connected>]
format-disconnected = [<label-disconnected>]

label-connected = +E+
label-disconnected = -E-

[module/wireless]
type = internal/network

interval = 3

interface = wlan0

interface-type = wireless

unknown-as-up = false

format-connected = [<label-connected>]
format-disconnected = [<label-disconnected>]

label-connected = %{A1:alacritty -e nmtui-connect:}%{A3:nm-connection-editor:}+W+%{A}%{A}
label-disconnected = %{A1:alacritty -e nmtui-connect:}%{A3:nm-connection-editor:}-W-%{A}%{A}
