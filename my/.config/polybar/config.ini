[colors]
bground = "#301934"
fground = "#faf9f6"
mground = "#3f3f3f"
r = "#ff0000"
g = "#00ff00"
b = "#0000ff"

[monitors]
main = eDP-1
hdmi = HDMI-1

[bar/main]
background = ${colors.bground}
bottom = false
dpi-x = 0
dpi-y = 0
enable-ipc = true
fixed-center = true
font-0 = "JetBrains Mono:style=Regular;size=12;0"
foreground = ${colors.fground}
height = 50
module-margin = 2
modules-center = date
modules-left = i3
modules-right = light tun wireless wired audio monitor battery power
monitor = ${monitors.main}
override-redirect = false
padding-left = 0
padding-right = 2
radius = 0
width = 100%

[bar/hdmi]
inherit = bar/main
monitor = ${monitors.hdmi}

[module/audio]
click-left = pavucontrol
click-right = pavucontrol
format-muted = [<label-muted>]
format-volume = [<label-volume>]
interval = 5
label-muted = MUT
label-volume = %percentage:3%
type = internal/pulseaudio
use-ui-max = false

[module/battery]
battery = BAT0
format-charging = [<label-charging>]
format-discharging = [<label-discharging>]
format-full = [<label-full>]
format-low = [<label-low>]
full-at = 100
label-charging = %percentage:3%
label-charging-foreground = ${colors.g}
label-discharging = %percentage:3%
label-discharging-foreground = ${colors.fground}
label-full = FUL
label-full-foreground = ${colors.fground}
label-low = LOW
label-low-foreground = ${colors.r}
low-at = 15
poll-interval = 30
type = internal/battery

[module/date]
format = <label>
interval = 1
label = %time%
time = %H:%M:%S
time-alt = %d/%m/%y %A
type = internal/date

[module/i3]
enable-scroll = false
format = <label-state> <label-mode>
index-sort = true
label-focused = %index%
label-focused-background = ${colors.mground}
label-focused-padding = 3
label-mode = %mode%
label-mode-background = ${colors.mground}
label-mode-padding = 2
label-unfocused = %index%
label-unfocused-padding = 3
label-urgent = %index%
label-urgent-padding = 3
label-visible = %index%
label-visible-padding = 3
pin-workspaces = true
type = internal/i3

[module/light]
enable-scroll = true
format = [<label>]
label = %percentage:3%
poll-interval = 0
scroll-interval = 5
type = internal/backlight
use-actual-brightness = true

[module/monitor]
click-left = "#monitor.hook.0"
click-right = "#monitor.hook.1"
format = [<label>]
hook-0 = arandr
hook-1 = arandr
label = MONITOR
type = custom/ipc

[module/power]
click-left = "#power.hook.0"
click-middle = "#power.hook.2"
click-right = "#power.hook.1"
format = [<label>]
hook-0 = bash "$HOME"/.local/bin/power.sh systemctl poweroff
hook-1 = bash "$HOME"/.local/bin/power.sh systemctl reboot
hook-2 = bash "$HOME"/.local/bin/power.sh i3-msg exit
label = POWER
type = custom/ipc

[module/tun]
exec = echo TUN
exec-if = ip a | grep "tun[0-9]"
format = [<label>]
interval = 5
label = %output%
type = custom/script

[module/wired]
animation-packetloss-0 = ETHER
animation-packetloss-0-foreground = ${colors.r}
animation-packetloss-1 =
animation-packetloss-1-foreground = ${colors.r}
animation-packetloss-framerate = 1000
format-connected = [<label-connected>]
format-disconnected = [<label-disconnected>]
format-packetloss = [<animation-packetloss>]
interface = eth0
interface-type = wired
interval = 3
label-connected = ETHER
label-connected-foreground = ${colors.fground}
label-disconnected = ETHER
label-disconnected-foreground = ${colors.r}
ping-interval = 2
type = internal/network
unknown-as-up = false

[module/wireless]
animation-packetloss-0 = WLAN
animation-packetloss-0-foreground = ${colors.r}
animation-packetloss-1 =
animation-packetloss-1-foreground = ${colors.r}
animation-packetloss-framerate = 1000
format-connected = [<label-connected>]
format-disconnected = [<label-disconnected>]
format-packetloss = [<animation-packetloss>]
interface = wlan0
interface-type = wireless
interval = 3
label-connected = WLAN
label-connected-foreground = ${colors.fground}
label-disconnected = WLAN
label-disconnected-foreground = ${colors.r}
ping-interval = 2
type = internal/network
unknown-as-up = false
