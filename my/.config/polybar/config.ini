[colors]
background = "#301934"
foreground = "#faf9f6"


[monitors]
primary = eDP-1
external = HDMI-1


[bar/primary]
monitor = ${monitors.primary}

enable-ipc = true

bottom = false

override-redirect = false

modules-left = i3
modules-center = date
modules-right = backlight vpn wireless wired audio applets battery

fixed-center = true

width = 100%
height = 50

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0

padding-left = 0
padding-right = 2

module-margin = 2

font-0 = "RobotoMono Nerd Font:style=Regular;size=12;0"

dpi-x = 0
dpi-y = 0


[bar/external]
monitor = ${monitors.external}

inherit = bar/primary


[module/applets]
type = custom/ipc

format =  󰍹

hook-0 = blueberry
hook-1 = arandr

click-left = "#applets.hook.0"
click-right = "#applets.hook.1"


[module/audio]
type = internal/pulseaudio

interval = 5

use-ui-max = false

format-volume = <ramp-volume> <label-volume>
format-muted = 󰖁 <label-muted>

label-volume = %percentage:3%
label-muted = %percentage:3%

ramp-volume-0 = 󰝞
ramp-volume-1 = 󰝝

click-left = pavucontrol
click-right = pavucontrol


[module/backlight]
type = custom/ipc

format =  <label>

label = %output:3%

hook-0 = brightnessctl set 00%+ 2> /dev/null | grep -o -P "[0-9]+(?=%)" || echo 100
hook-1 = brightnessctl set 10%+ 2> /dev/null | grep -o -P "[0-9]+(?=%)" || echo 100
hook-2 = brightnessctl set 10%- 2> /dev/null | grep -o -P "[0-9]+(?=%)" || echo 100

initial = 1

scroll-up = "#backlight.hook.1"
scroll-down = "#backlight.hook.2"


[module/battery]
type = internal/battery

poll-interval = 5

full-at = 99
low-at = 15

battery = BAT0

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = 󰁹 <label-full>
format-low = 󰂎 <label-low>

label-charging = %percentage:3%
label-discharging = %percentage:3%
label-full = %percentage:3%
label-low = %percentage:3%

ramp-capacity-0 = 󱊡
ramp-capacity-1 = 󱊡
ramp-capacity-2 = 󱊢
ramp-capacity-3 = 󱊢
ramp-capacity-4 = 󱊣
ramp-capacity-5 = 󱊣

animation-charging-framerate = 1000

animation-charging-0 = 󱊡
animation-charging-1 = 󱊢
animation-charging-2 = 󱊣


[module/date]
type = internal/date

interval = 1

time = %H:%M:%S
time-alt = %d/%m/%y %A

format = <label>

label = %time%


[module/i3]
type = internal/i3

pin-workspaces = true

index-sort = true

enable-scroll = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = "#d2042d"

label-focused = %index%
label-focused-padding = 3
label-focused-background = "#3f3f3f"

label-unfocused = %index%
label-unfocused-padding = 3

label-visible = %index%
label-visible-padding = 3

label-urgent = %index%
label-urgent-padding = 3


[module/vpn]
type = custom/script

interval = 3

exec = ip a | grep -o "tun[0-9]" | uniq
exec-if = ip a | grep "tun[0-9]"

format = 󰖂 <label>

label = %output%


[module/wired]
type = internal/network

interval = 3

interface = eth0

interface-type = wired

unknown-as-up = false

format-connected = 󰱓 <label-connected>
format-disconnected = 󰅛 <label-disconnected>

label-connected = %ifname%
label-disconnected = %ifname%


[module/wireless]
type = internal/network

interval = 3

interface = wlan0

interface-type = wireless

unknown-as-up = false

format-connected = <ramp-signal> <label-connected>
format-disconnected = 󰤭 <label-disconnected>

label-connected = %{A1:alacritty -e nmtui-connect:}%{A3:nm-connection-editor:}%ifname%%{A}%{A}
label-disconnected = %{A1:alacritty -e nmtui-connect:}%{A3:nm-connection-editor:}%ifname%%{A}%{A}

ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
