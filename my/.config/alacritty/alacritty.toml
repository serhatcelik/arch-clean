live_config_reload = true
working_directory = "None"

[bell]
animation = "EaseOutExpo"
color = "#301934"
command = "None"
duration = 0

[colors.normal]
black = "#073642"
blue = "#268bd2"
cyan = "#2aa198"
green = "#859900"
magenta = "#d33682"
red = "#dc322f"
white = "#eee8d5"
yellow = "#b58900"

[colors.primary]
background = "#002b36"
foreground = "#839496"

[cursor]
style = "Block"
thickness = 0.15
unfocused_hollow = true

[font]
builtin_box_drawing = true
size = 12.0

[font.normal]
family = "Roboto Mono for Powerline"
style = "Regular"

[font.bold]
family = "Roboto Mono for Powerline"
style = "Bold"

[font.bold_italic]
family = "Roboto Mono for Powerline"
style = "Bold Italic"

[font.italic]
family = "Roboto Mono for Powerline"
style = "Italic"

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 0

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window]
decorations = "Full"
dynamic_padding = true
dynamic_title = true
opacity = 1.0
position = "None"
startup_mode = "Windowed"
title = "Alacritty"

[window.dimensions]
columns = 120
lines = 30

[window.padding]
x = 12
y = 12
